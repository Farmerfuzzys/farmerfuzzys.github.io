<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarmdisplay | Fire Dispatcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="display-monitor-body">
  <main class="display-monitor">
    <section class="display-vehicle-rail">
      <div class="rail-header">
        <span>Status</span>
        <strong>Fahrzeuge</strong>
      </div>
      <div id="displayVehicleRail" class="display-vehicle-list"></div>
    </section>

    <section class="display-main-board">
      <div class="display-topline">
        <div class="display-clock-group">
          <strong id="clock"></strong>
          <span id="date"></span>
        </div>
        <div class="display-branding">
          <img src="Fire Dispatcher.png" alt="Fire Dispatcher Logo" class="display-brand-logo">
          <span>FIRE DISPATCHER</span>
          <small id="displayBrandSubtitle">Alarmdisplay</small>
        </div>
      </div>

      <div class="display-content-grid">
        <section class="display-news-panel">
          <div class="display-panel-title">Laufende Informationen</div>
          <div id="displayMessages" class="display-message-list"></div>
        </section>

        <section class="display-center-panel">
          <div class="display-panel-title">Aktueller Einsatz</div>
          <div id="displayAlarmCard" class="display-alarm-card"></div>
        </section>

        <aside class="display-side-panel">
          <div class="display-side-card logo-card">
            <img id="displayStationLogo" src="Fire Dispatcher.png" alt="Wehrlogo" class="display-logo">
          </div>

          <div class="display-side-card">
            <div class="display-panel-title">Wetter</div>
            <div class="weather-stack">
              <strong id="weatherTemp">-- °C</strong>
              <span id="weatherDescription">Wetter wird geladen</span>
              <small id="weatherWind">Wind -- km/h</small>
            </div>
          </div>

          <div class="display-side-card">
            <div class="display-panel-title">Hinweis</div>
            <p id="displayHint" class="display-hint-text"></p>
          </div>

          <div class="display-side-card compact">
            <div class="display-panel-title">Status</div>
            <div class="status-mini-list">
              <span><b>1</b> Einsatzbereit Funk</span>
              <span><b>2</b> Auf Wache</span>
              <span><b>3</b> Einsatz übernommen</span>
              <span><b>4</b> Einsatzstelle</span>
              <span><b>5</b> Sprechwunsch</span>
              <span><b>6</b> Nicht einsatzbereit</span>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script type="module">
    import {
      ALARM_STORAGE_KEY,
      ROLE_ALARM_DISPLAY,
      VEHICLE_STORAGE_KEY,
      attachClock,
      enforcePageAccess,
      getCurrentAlarm,
      getCurrentUser,
      getStations,
      getStatusInfo,
      getVehicles
    } from "./app.js";

    if (!enforcePageAccess([ROLE_ALARM_DISPLAY])) {
      throw new Error("Kein Zugriff");
    }

    const currentUser = getCurrentUser();
    const currentStation = getStations().find((station) => station.id === currentUser.stationId);
    const autoClearSeconds = Number(currentStation?.alarmAutoClearSeconds || 0);

    const vehicleRail = document.getElementById("displayVehicleRail");
    const alarmCard = document.getElementById("displayAlarmCard");
    const displayMessages = document.getElementById("displayMessages");
    const displayHint = document.getElementById("displayHint");
    const displayStationLogo = document.getElementById("displayStationLogo");
    const displayBrandSubtitle = document.getElementById("displayBrandSubtitle");
    const weatherTemp = document.getElementById("weatherTemp");
    const weatherDescription = document.getElementById("weatherDescription");
    const weatherWind = document.getElementById("weatherWind");

    if (currentStation?.logoDataUrl) {
      displayStationLogo.src = currentStation.logoDataUrl;
    }
    displayBrandSubtitle.textContent = currentStation?.name || "Alarmdisplay";

    const weatherCodeMap = {
      0: "Klar",
      1: "Überwiegend klar",
      2: "Teilweise bewölkt",
      3: "Bedeckt",
      45: "Neblig",
      48: "Raureifnebel",
      51: "Leichter Nieselregen",
      53: "Nieselregen",
      55: "Starker Nieselregen",
      61: "Leichter Regen",
      63: "Regen",
      65: "Starker Regen",
      66: "Gefrierender Regen",
      67: "Starker gefrierender Regen",
      71: "Leichter Schneefall",
      73: "Schneefall",
      75: "Starker Schneefall",
      77: "Schneegriesel",
      80: "Regenschauer",
      81: "Starke Regenschauer",
      82: "Heftige Regenschauer",
      85: "Schneeschauer",
      86: "Starke Schneeschauer",
      95: "Gewitter",
      96: "Gewitter mit Hagel",
      99: "Starkes Gewitter mit Hagel"
    };

    function renderVehicleRail(vehicles) {
      if (!vehicles.length) {
        vehicleRail.innerHTML = '<div class="display-message-item">Keine Fahrzeuge hinterlegt.</div>';
        return;
      }

      vehicleRail.innerHTML = vehicles.map((vehicle) => {
        const status = getStatusInfo(vehicle.status);
        return `
          <div class="display-vehicle-row ${status.className}">
            <span class="display-vehicle-code">${vehicle.status}</span>
            <div class="display-vehicle-text">
              <strong>${vehicle.name}</strong>
              <small>${vehicle.type} · ${vehicle.station}</small>
            </div>
          </div>
        `;
      }).join("");
    }

    function isAlarmExpired(alarm) {
      if (!alarm?.updatedAt || autoClearSeconds <= 0) {
        return false;
      }
      return (Date.now() - new Date(alarm.updatedAt).getTime()) > (autoClearSeconds * 1000);
    }

    function renderAlarm(alarm) {
      if (!alarm || isAlarmExpired(alarm)) {
        alarmCard.innerHTML = `
          <div class="display-stichwort">Kein aktiver Einsatz</div>
          <div class="display-address">Die Einsatzanzeige ist aktuell leer.</div>
          <div class="display-message">Neue Einsätze werden automatisch eingeblendet und nach Ablauf der eingestellten Zeit wieder ausgeblendet.</div>
        `;
        displayHint.textContent = "Aktuell keine Zusatzhinweise.";
        displayMessages.innerHTML = `
          <div class="display-message-item">
            <strong>Alarmdisplay</strong>
            <p>Kein aktiver Einsatz vorhanden.</p>
            <small>Stand aktuell</small>
          </div>
        `;
        return;
      }

      alarmCard.innerHTML = `
        <div class="display-stichwort">${alarm.stichwort || "Kein Einsatz"}</div>
        <div class="display-address">${alarm.ort || "Kein Ort hinterlegt"}</div>
        <div class="display-units">${(alarm.groups || []).join(" · ") || "Keine Gruppen"}${alarm.units?.length ? ` | ${alarm.units.join(", ")}` : ""}</div>
        <div class="display-message">${alarm.info || "Keine Zusatzmeldung vorhanden."}</div>
      `;

      displayHint.textContent = alarm.info || "Aktuell keine Zusatzhinweise.";

      const items = [
        { title: "Leitstelle", text: `${alarm.bearbeiter || "Disponent"} hat den Einsatz aktualisiert.` },
        { title: "Einsatzort", text: alarm.ort || "Kein Einsatzort." },
        { title: "Alarmierte Kräfte", text: (alarm.units || []).join(", ") || "Keine Fahrzeuge ausgewählt." }
      ];

      displayMessages.innerHTML = items.map((item, index) => `
        <div class="display-message-item">
          <strong>${item.title}</strong>
          <p>${item.text}</p>
          <small>Eintrag ${index + 1}</small>
        </div>
      `).join("");
    }

    async function loadWeather() {
      try {
        const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=50.9848&longitude=11.0299&current=temperature_2m,weather_code,wind_speed_10m&timezone=Europe%2FBerlin&temperature_unit=celsius&wind_speed_unit=kmh");
        if (!response.ok) {
          throw new Error("Wetter konnte nicht geladen werden.");
        }
        const data = await response.json();
        const current = data.current || {};
        weatherTemp.textContent = `${Math.round(current.temperature_2m ?? 0)} °C`;
        weatherDescription.textContent = weatherCodeMap[current.weather_code] || "Unbekannt";
        weatherWind.textContent = `Wind ${Math.round(current.wind_speed_10m ?? 0)} km/h · Erfurt`;
      } catch (error) {
        weatherTemp.textContent = "-- °C";
        weatherDescription.textContent = "Wetter nicht verfügbar";
        weatherWind.textContent = "Wind -- km/h";
      }
    }

    function renderAll() {
      renderAlarm(getCurrentAlarm());
      renderVehicleRail(getVehicles(currentUser.stationId));
    }

    attachClock("clock", "date");
    renderAll();
    loadWeather();
    setInterval(loadWeather, 600000);
    setInterval(renderAll, 1000);

    window.addEventListener("storage", (event) => {
      if (event.key === ALARM_STORAGE_KEY || event.key === VEHICLE_STORAGE_KEY) {
        renderAll();
      }
    });
  </script>
</body>
</html>
