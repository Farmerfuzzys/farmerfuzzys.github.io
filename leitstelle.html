<!DOCTYPE html>
<html>
<body style="background:black;color:white">

<h1>🚒 Leitstelle</h1>

<input id="ort" placeholder="Ort"><br>
<input id="stichwort" placeholder="Stichwort"><br>
<input id="info" placeholder="Info"><br>

<button onclick="alarm()">🚨 Alarm</button>

<div id="anzeige"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "HIER_DEIN_KEY",
  projectId: "farmerfuzzys-c32eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.alarm = async () => {
  await setDoc(doc(db,"system","alarm"), {
    ort: ort.value,
    stichwort: stichwort.value,
    info: info.value,
    time: new Date().toLocaleTimeString()
  });
};

// LIVE
onSnapshot(doc(db,"system","alarm"), (snap) => {
  if (!snap.exists()) return;
  const a = snap.data();

  anzeige.innerHTML = `
    <h2>🚨 AKTUELL</h2>
    <p>${a.stichwort}</p>
    <p>${a.ort}</p>
    <p>${a.info}</p>
  `;
});
</script>

</body>
</html>
