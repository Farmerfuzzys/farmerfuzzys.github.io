<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Leitstelle</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f14;
  color:#e6edf3;
}

.header {
  background:#161b22;
  padding:15px;
  border-bottom:1px solid #30363d;
  font-size:18px;
}

.container {
  display:grid;
  grid-template-columns: 2fr 1fr;
  height:calc(100vh - 50px);
}

.panel {
  padding:20px;
  border-right:1px solid #30363d;
}

h2 {
  font-size:14px;
  margin-bottom:10px;
  color:#8b949e;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#161b22;
  border:1px solid #30363d;
  color:white;
}

button {
  width:100%;
  padding:10px;
  background:#238636;
  border:none;
  color:white;
  cursor:pointer;
}

.alarm {
  margin-top:20px;
  padding:15px;
  background:#161b22;
  border:1px solid #30363d;
}

.vehicle {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #30363d;
}

.status {
  font-size:12px;
  color:#8b949e;
}
</style>
</head>

<body>

<div class="header">Leitstelle – Einsatzsystem</div>

<div class="container">

<!-- LINKS -->
<div class="panel">
<h2>Einsatz erstellen</h2>

<input id="ort" placeholder="Einsatzort">
<input id="stichwort" placeholder="Stichwort">
<input id="info" placeholder="Zusatzinfo">

<button onclick="createAlarm()">Einsatz anlegen</button>

<h2>Aktueller Einsatz</h2>
<div id="alarmBox" class="alarm">Kein Einsatz aktiv</div>
</div>

<!-- RECHTS -->
<div class="panel">
<h2>Fahrzeuge</h2>
<div id="vehicleList"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDiYOJWP4XMQRJ6b-RfJp6Aqxis7E-uA30",
  authDomain: "farmerfuzzys-c32eb.firebaseapp.com",
  projectId: "farmerfuzzys-c32eb",
  storageBucket: "farmerfuzzys-c32eb.firebasestorage.app",
  messagingSenderId: "842395157432",
  appId: "1:842395157432:web:fd031d7cc0c2a6e69ec54d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const statusText = {
  0:"0 Dringend",
  1:"1 Funk",
  2:"2 Wache",
  3:"3 Anfahrt",
  4:"4 Einsatzort",
  5:"5 Sprechwunsch",
  6:"6 Nicht bereit",
  7:"7 Transport",
  8:"8 Zielort",
  9:"9 Sonderstatus"
};

// Einsatz erstellen
window.createAlarm = async () => {
  await setDoc(doc(db,"system","alarm"), {
    ort: ort.value,
    stichwort: stichwort.value,
    info: info.value
  });
};

// Einsatz anzeigen
onSnapshot(doc(db,"system","alarm"), (snap) => {
  if (!snap.exists()) return;

  const a = snap.data();

  alarmBox.innerHTML = `
    <b>${a.stichwort}</b><br>
    ${a.ort}<br>
    ${a.info || ""}
  `;
});

// Fahrzeuge anzeigen
onSnapshot(collection(db,"vehicles"), (snap) => {
  vehicleList.innerHTML = "";

  snap.forEach(d => {
    const v = d.data();

    vehicleList.innerHTML += `
      <div class="vehicle">
        <div>${v.name}</div>
        <div class="status">${statusText[v.status]}</div>
      </div>
    `;
  });
});
</script>

</body>
</html>
