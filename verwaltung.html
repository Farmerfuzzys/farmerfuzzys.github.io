<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body class="admin">

<h1>Verwaltung</h1>

<div id="list"></div>

<script type="module">
import { db } from "./firebase.js";
import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

onSnapshot(collection(db,"users"), snap => {
  list.innerHTML = "";

  snap.forEach(doc => {
    const u = doc.data();

    list.innerHTML += `
      <div class="user">
        <b>${u.username}</b><br>
        Rollen: ${u.role}
      </div>
    `;
  });
});
</script>

</body>
</html>
