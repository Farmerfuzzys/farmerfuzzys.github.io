<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statusübersicht | Fire Dispatcher Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portal-body portal-body-dark">
  <main class="portal-app">
    <aside class="portal-sidebar portal-sidebar-dark">
      <div class="portal-sidebar-brand">
        <img src="Fire Dispatcher.png" alt="Fire Dispatcher Logo">
      </div>
      <nav class="portal-nav" id="portalNav"></nav>
    </aside>

    <section class="portal-main status-board-body">
      <header class="portal-topbar portal-topbar-dark">
        <div>
          <h1>Statusübersicht</h1>
          <p>Fahrzeuge nach Wehr und Wache</p>
        </div>
        <div class="portal-header-right">
          <div class="portal-school-name" id="schoolName">Fire Dispatcher</div>
        </div>
      </header>

      <section class="status-board-shell">
        <div id="statusStationTabs" class="status-board-tabs"></div>
        <div id="statusBoardContent" class="status-board-grid"></div>
      </section>
    </section>
  </main>

  <script type="module">
    import {
      ROLE_ADMIN,
      ROLE_HOST,
      ROLE_WEHRLEITER,
      enforcePageAccess,
      getCurrentUser,
      getManagedStations,
      getStatusInfo,
      getVehicles,
      requireAnyRole
    } from "./app.js";

    if (!enforcePageAccess([ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER])) {
      throw new Error("Kein Zugriff");
    }

    const user = getCurrentUser();
    const stations = getManagedStations(user);
    const portalNav = document.getElementById("portalNav");
    const statusStationTabs = document.getElementById("statusStationTabs");
    const statusBoardContent = document.getElementById("statusBoardContent");
    const schoolName = document.getElementById("schoolName");

    schoolName.textContent = user.role;

    const navigation = [
      { label: "Übersicht", href: "dashboard.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER] },
      { label: "Verwaltung", href: "verwaltung.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER] },
      { label: "Statusübersicht", href: "status.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER] },
      { label: "Statusverlauf", href: "statusverlauf.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER] },
      { label: "Einstellungen", href: "settings.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER] }
    ];

    portalNav.innerHTML = navigation
      .filter((item) => requireAnyRole(item.roles))
      .map((item) => `<a class="portal-nav-item ${item.href === "status.html" ? "active" : ""}" href="${item.href}">${item.label}</a>`)
      .join("");

    let activeStationId = stations[0]?.id || null;

    function renderTabs() {
      statusStationTabs.innerHTML = stations.map((station) => `
        <button class="status-station-tab ${station.id === activeStationId ? "active" : ""}" data-station-tab="${station.id}" type="button">${station.name}</button>
      `).join("");

      statusStationTabs.querySelectorAll("[data-station-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          activeStationId = button.dataset.stationTab;
          renderTabs();
          renderBoard();
        });
      });
    }

    function renderBoard() {
      const station = stations.find((entry) => entry.id === activeStationId);
      const vehicles = getVehicles(activeStationId);

      if (!station) {
        statusBoardContent.innerHTML = '<div class="portal-list-item">Keine Wehr vorhanden.</div>';
        return;
      }

      const grouped = vehicles.reduce((acc, vehicle) => {
        const key = vehicle.station || station.name;
        acc[key] = acc[key] || [];
        acc[key].push(vehicle);
        return acc;
      }, {});

      statusBoardContent.innerHTML = Object.entries(grouped).map(([groupName, groupVehicles]) => `
        <section class="status-board-card">
          <div class="status-board-title">${groupName}</div>
          <div class="status-board-list">
            ${groupVehicles.map((vehicle) => {
              const status = getStatusInfo(vehicle.status);
              return `
                <div class="status-board-row">
                  <span class="status-square status-${vehicle.status}">${status.shortLabel || vehicle.status}</span>
                  <strong>${vehicle.name}</strong>
                  <small>${vehicle.type || "Fahrzeug"}</small>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `).join("") || '<div class="portal-list-item">Noch keine Fahrzeuge vorhanden.</div>';
    }

    renderTabs();
    renderBoard();
  </script>
</body>
</html>
