<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstellungen | Fire Dispatcher Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portal-body portal-body-dark">
  <main class="portal-app">
    <aside class="portal-sidebar portal-sidebar-dark">
      <div class="portal-sidebar-brand">
        <img src="Fire Dispatcher.png" alt="Fire Dispatcher Logo">
      </div>
      <nav class="portal-nav" id="portalNav"></nav>
    </aside>

    <section class="portal-main">
      <header class="portal-topbar portal-topbar-dark">
        <div>
          <h1>Einstellungen</h1>
          <p>Deine Kontoinformationen</p>
        </div>
        <div class="portal-header-right">
          <div class="portal-school-name" id="schoolName">Meine Feuerwehr</div>
          <div class="portal-userbox portal-userbox-dark">
            <div class="portal-user-meta">
              <strong id="userName">Jaemy</strong>
              <span id="userRole">HOST</span>
            </div>
          </div>
        </div>
      </header>

      <section class="portal-content">
        <div class="portal-card portal-card-dark">
          <div class="portal-card-title">Kontodaten</div>
          <div class="settings-grid" id="settingsGrid"></div>
          <p class="settings-note">Die Daten werden hier nur angezeigt. Bearbeiten dürfen sie nur die zuständige Verwaltungsebene.</p>
        </div>
      </section>
    </section>
  </main>

  <script type="module">
    import {
      ROLE_ADMIN,
      ROLE_ALARM_DISPLAY,
      ROLE_DISPONENT,
      ROLE_EINSATZKRAFT,
      ROLE_HOST,
      ROLE_WEHRLEITER,
      enforcePageAccess,
      getCurrentUser,
      getStationName,
      requireAnyRole
    } from "./app.js";

    // Protect page access - redirect to login if not authenticated
    if (!enforcePageAccess([ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER, ROLE_DISPONENT, ROLE_EINSATZKRAFT, ROLE_ALARM_DISPLAY])) {
      throw new Error("Kein Zugriff");
    }

    const user = getCurrentUser();
    const settingsGrid = document.getElementById("settingsGrid");
    const portalNav = document.getElementById("portalNav");

    document.getElementById("userName").textContent = user.name || "Benutzer";
    document.getElementById("userRole").textContent = user.role || ROLE_EINSATZKRAFT;
    document.getElementById("schoolName").textContent = user.stationId ? getStationName(user.stationId) : "Fire Dispatcher";

    const navigation = [
      { label: "Übersicht", href: "dashboard.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER, ROLE_DISPONENT, ROLE_EINSATZKRAFT, ROLE_ALARM_DISPLAY] },
      { label: "Verwaltung", href: "verwaltung.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER] },
      { label: "Leitstelle", href: "leitstelle.html", roles: [ROLE_DISPONENT] },
      { label: "Alarmdisplay", href: "display.html", roles: [ROLE_ALARM_DISPLAY] },
      { label: "Statusübersicht", href: "status.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER] },
      { label: "Statusverlauf", href: "statusverlauf.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER] },
      { label: "Einstellungen", href: "settings.html", roles: [ROLE_HOST, ROLE_ADMIN, ROLE_WEHRLEITER, ROLE_DISPONENT, ROLE_EINSATZKRAFT, ROLE_ALARM_DISPLAY] }
    ];

    portalNav.innerHTML = navigation
      .filter((item) => requireAnyRole(item.roles))
      .map((item) => `<a class="portal-nav-item ${item.href === "settings.html" ? "active" : ""}" href="${item.href}">${item.label}</a>`)
      .join("");

    const rows = [
      ["Name", user.name || "-"],
      ["Rolle", user.role || "-"],
      ["Wehr", user.stationId ? getStationName(user.stationId) : "Systemweit"],
      ["E-Mail", user.email || "-"],
      ["Konto-ID", user.id || "-"]
    ];

    settingsGrid.innerHTML = rows.map(([label, value]) => `
      <div class="settings-row">
        <span>${label}</span>
        <strong>${value || "-"}</strong>
      </div>
    `).join("");
  </script>
</body>
</html>
