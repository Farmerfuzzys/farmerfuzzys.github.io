<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  
  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/ 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://*.firebaseapp.com https://*.firebasedatabase.app https://*.firebaseio.com https://*.googleapis.com https://www.gstatic.com;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  
  <title>Fire Dispatcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portal-login-body">
  <main class="portal-login-shell">
    <section class="portal-login-hero">
      <div class="portal-hero-overlay">
        <img src="Fire Dispatcher.png" alt="Fire Dispatcher Logo" class="portal-login-logo">
        <p>Fire Dispatcher</p>
      </div>
    </section>

    <section class="portal-login-form">
      <div class="portal-login-title">Anmeldung</div>
      <div class="portal-login-card">
        <p>Bitte gib deine Email und dein Kennwort ein.</p>

        <div class="field">
          <label for="username">Email</label>
          <input id="username" type="email" placeholder="deine@email.com">
        </div>

        <div class="field">
          <label for="password">Kennwort</label>
          <input id="password" type="password" placeholder="Kennwort">
        </div>

        <div class="inline-actions">
          <button id="loginButton" type="button">Anmelden</button>
        </div>

        <p id="error" class="feedback"></p>
      </div>
    </section>
  </main>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      ROLE_ADMIN,
      ROLE_ALARM_DISPLAY,
      ROLE_DISPONENT,
      ROLE_EINSATZKRAFT,
      ROLE_HOST,
      ROLE_WEHRLEITER,
      setCurrentUser,
      setRoles
    } from "./app.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const usernameField = document.getElementById("username");
    const passwordField = document.getElementById("password");
    const errorText = document.getElementById("error");
    const loginButton = document.getElementById("loginButton");

    async function login() {
      errorText.textContent = "";
      loginButton.disabled = true;

      try {
        const email = usernameField.value;
        const user = await signInWithEmailAndPassword(auth, email, passwordField.value);
        const snap = await getDoc(doc(db, "users", user.user.uid));
        if (!snap.exists()) {
          throw new Error("Keine Rollen vorhanden");
        }

        const roleData = snap.data().role || [];
        const roles = Array.isArray(roleData) ? roleData : [roleData];
        setRoles(roles);
        setCurrentUser({
          id: user.user.uid,
          name: snap.data().name || usernameField.value,
          role: roles[0] || ROLE_EINSATZKRAFT,
          stationId: snap.data().stationId || null,
          email
        });
        window.location.href = "dashboard.html";
      } catch (error) {
        errorText.textContent = "Login fehlgeschlagen. Bitte überprüfen Sie Ihre Zugangsdaten.";
      } finally {
        loginButton.disabled = false;
      }
    }

    loginButton.addEventListener("click", login);
    passwordField.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        login();
      }
    });
  </script>
</body>
</html>
