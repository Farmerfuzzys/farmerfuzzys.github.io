<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Passwort"><br><br>
<button onclick="login()">Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDiYOJWP4XMQRJ6b-RfJp6Aqxis7E-uA30",
  authDomain: "farmerfuzzys-c32eb.firebaseapp.com",
  projectId: "farmerfuzzys-c32eb",
  storageBucket: "farmerfuzzys-c32eb.firebasestorage.app",
  messagingSenderId: "842395157432",
  appId: "1:842395157432:web:fd031d7cc0c2a6e69ec54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async () => {
  const user = await signInWithEmailAndPassword(auth, email.value, password.value);
  const snap = await getDoc(doc(db, "users", user.user.uid));

  const role = snap.data().role;

  if (role === "dispatcher") window.location = "leitstelle.html";
  if (role === "vehicle") window.location = "fahrzeug.html";
  if (role === "admin") window.location = "admin.html";
};
</script>

</body>
</html>
