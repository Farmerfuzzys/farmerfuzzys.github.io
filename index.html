<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Dispatcher Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portal-login-body">
  <main class="portal-login-shell">
    <section class="portal-login-hero">
      <div class="portal-hero-overlay">
        <img src="Fire Dispatcher.png" alt="Fire Dispatcher Logo" class="portal-login-logo">
        <p>Fire Dispatcher Portal</p>
      </div>
    </section>

    <section class="portal-login-form">
      <div class="portal-login-title">Anmeldung</div>
      <div class="portal-login-card">
        <p>Bitte gib deinen Benutzernamen und dein Kennwort ein.</p>

        <div class="field">
          <label for="username">Benutzername</label>
          <input id="username" placeholder="Benutzername">
        </div>

        <div class="field">
          <label for="password">Kennwort</label>
          <input id="password" type="password" placeholder="Kennwort">
        </div>

        <div class="inline-actions">
          <button id="loginButton" type="button">Anmelden</button>
        </div>

        <p id="error" class="feedback"></p>

        <div class="portal-demo-grid three-demo-columns">
          <button id="demoHost" class="secondary" type="button">Demo HOST</button>
          <button id="demoAdmin" class="secondary" type="button">Demo ADMIN</button>
          <button id="demoWehrleiter" class="secondary" type="button">Demo WEHRLEITER</button>
          <button id="demoDisponent" class="secondary" type="button">Demo DISPONENT</button>
          <button id="demoEinsatzkraft" class="secondary" type="button">Demo EINSATZKRAFT</button>
          <button id="demoDisplay" class="secondary" type="button">Demo ALARM DISPLAY</button>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
